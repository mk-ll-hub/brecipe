<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brecipe Sign In</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="img/icon 192 (1).png">
    <link rel="apple-touch-icon" href="img/icon 192 (1).png">

    <link rel="stylesheet" href="style/signin.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

    <div class="block1">
        <img src="img/icon 512.png" alt="" class="logo">
        <p class="appname">Brecipe</p>
    </div>

    <div class="block2">
        <input type="text" class="username" placeholder="Ваше имя"> 
        <input type="text" class="password" placeholder="Ваш пароль">
        <input type="text" class="password_ver" placeholder="Подтвердите пароль">
    </div>

    <p class="uzhe2">Пароль должен содержать не менее 6 символов</p>

    <p class="uzhe">
        Уже есть аккаунт - <a class="link" href="login_page.html">Войти</a>
    </p>

    <div class="block3">
        <button class="done">Зарегистрироваться</button>
    </div>

    <script src="script/signin.js"></script>
</body>
</html>
