<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brecipe</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="img/icon 192 (1).png">
    <link rel="apple-touch-icon" href="img/icon 192 (1).png">

    <link rel="stylesheet" href="style/style.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Exo+2:ital,wght@0,100..900;1,100..900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="hd1">
            <img src="img/icon 192.png" alt="" class="logo">
        </div>
        <div class="hd2">
            <button class="search_button">
                <img src="img/magnifying-glass.png" alt="" class="search_button_icon">
            </button>
            <a href="profile.html" class="profile">
                <img src="img/user.png" alt="" class="profile_icon">
            </a>
            
        </div>
        
        
        
    </header>

    <div class="filters">
        <button class="filter active">Все</button>
        <button class="filter">Завтрак</button>
        <button class="filter">Обед</button>
        <button class="filter">Ужин</button>
        <button class="filter">Мясо</button>
        <button class="filter">Курица</button>
        <button class="filter">Рыба</button>        
        <button class="filter">Салат</button>
        <button class="filter">Выпечка</button>
        <button class="filter">Жаренное</button>
        <button class="filter">Супы</button>
        <button class="filter">Легкое</button>
    </div>

    <div class="grid">
        <div class="card">1</div>
        <div class="card">2</div>
        <div class="card">3</div>
        <div class="card">4</div>
        <div class="card">5</div>
        <div class="card">6</div>
        <div class="card">7</div>
        <div class="card">8</div>
        <div class="card">9</div>
    </div>


    <footer class="footer">
        <div class="ft1">
            <button class="qr_button">
                <img src="img/qr-code.png" alt="" class="qr_icon">
            </button>
        </div>
        
        <div class="ft2">
            
            
            <button class="grid_toggle">
                <img src="img/check-box-empty.png" alt="" class="grid_toggle_icon">
            </button>
            <button class="edit_button">
                <img src="img/pencil.png" alt="" class="edit_icon">
            </button>
            <button class="add" onclick="window.location.href = 'creator.html'">+</button>
            
        </div>
        
    </footer>

    <div class="modal">
        <div class="modal-content">
            <button class="close-modal">
                <img src="img/close.png" alt="" class="close-modal-icon">
            </button>

            <img src="img/qr.png" alt="QR Code" class="qr-image">
        </div>
    </div>

    <script src="script/script.js"></script>
</body>
</html>
